server {
    listen 80;
    listen [::]:80;
    server_name mindweather.jeoninedu.life;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mindweather.jeoninedu.life;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/mindweather.jeoninedu.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindweather.jeoninedu.life/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:30410;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
